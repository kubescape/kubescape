apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: controlinputs.kubescape.io
  labels:
    app.kubernetes.io/name: kubescape
    app.kubernetes.io/component: operator
spec:
  group: kubescape.io
  scope: Cluster
  names:
    plural: controlinputs
    singular: controlinput
    kind: ControlInput
    shortNames:
      - ci
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                controls:
                  type: object
                  description: "Map of control IDs to their configuration values. Keys are control IDs (e.g., 'c-0001'), values are arrays of configuration strings."
                  additionalProperties:
                    type: array
                    items:
                      type: string
              required:
                - controls
