apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: securityexceptions.kubescape.io
spec:
  group: kubescape.io
  names:
    kind: SecurityException
    listKind: SecurityExceptionList
    plural: securityexceptions
    singular: securityexception
    shortNames:
      - se
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          required:
            - spec
          properties:
            apiVersion:
              type: string
            kind:
              type: string
            metadata:
              type: object
            spec:
              type: object
              x-kubernetes-validations:
                - rule: >-
                    !has(self.expiresAt)
                    || (has(oldSelf.expiresAt) && oldSelf.expiresAt == self.expiresAt)
                    || timestamp(self.expiresAt) > now()
                  message: "expiresAt must be in the future when newly set or changed"
              properties:
                author:
                  type: string
                reason:
                  type: string
                expiresAt:
                  type: string
                  format: date-time
                match:
                  type: object
                  properties:
                    objectSelector:
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                    resources:
                      type: array
                      items:
                        type: object
                        required:
                          - kind
                        properties:
                          apiGroup:
                            type: string
                          kind:
                            type: string
                          name:
                            type: string
                    images:
                      type: array
                      items:
                        type: string
                vulnerabilities:
                  type: array
                  items:
                    type: object
                    required:
                      - vulnerability
                      - status
                    properties:
                      vulnerability:
                        type: object
                        required:
                          - id
                        properties:
                          id:
                            type: string
                          aliases:
                            type: array
                            items:
                              type: string
                      status:
                        type: string
                        enum:
                          - not_affected
                          - fixed
                          - under_investigation
                      justification:
                        type: string
                        enum:
                          - component_not_present
                          - vulnerable_code_not_present
                          - vulnerable_code_not_in_execute_path
                          - vulnerable_code_cannot_be_controlled_by_adversary
                          - inline_mitigations_already_exist
                      impactStatement:
                        type: string
                      expiredOnFix:
                        type: boolean
                posture:
                  type: array
                  items:
                    type: object
                    required:
                      - controlID
                      - action
                    properties:
                      controlID:
                        type: string
                      frameworkName:
                        type: string
                      action:
                        type: string
                        enum:
                          - ignore
                          - alert_only
      subresources: {}
