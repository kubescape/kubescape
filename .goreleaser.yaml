# Make sure to check the documentation at https://goreleaser.com

# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy

archives:
  - id: default
    builds:
      - cli
    formats:
      - binary
      - tar.gz

builds:
  - id: cli
    binary: kubescape
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X "github.com/kubescape/kubescape/v3/core/cautils.BuildNumber={{.Env.RELEASE}}"
      - -X "github.com/kubescape/kubescape/v3/core/cautils.Client={{.Env.CLIENT}}"
  - id: downloader
    dir: downloader
    binary: downloader
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
  - id: http
    dir: httphandler
    binary: ksserver
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64

nfpms:
  - id: cli
    package_name: kubescape
    builds:
      - cli
    vendor: Kubescape
    homepage: https://kubescape.io/
    maintainer: matthiasb@kubescape.io
    formats:
      - apk
      - deb
      - rpm
    bindir: /usr/bin

docker_manifests:
  - name_template: "quay.io/kubescape/kubescape-cli:{{ .Tag }}-prerelease"
    image_templates:
      - "quay.io/kubescape/kubescape-cli:{{ .Tag }}-amd64"
      - "quay.io/kubescape/kubescape-cli:{{ .Tag }}-arm64"
  - name_template: "quay.io/kubescape/kubescape:{{ .Tag }}-prerelease"
    image_templates:
      - "quay.io/kubescape/kubescape:{{ .Tag }}-amd64"
      - "quay.io/kubescape/kubescape:{{ .Tag }}-arm64"

docker_signs:
  - artifacts: all
    stdin: "{{ .Env.COSIGN_PWD }}"

dockers:
  - image_templates:
      - "quay.io/kubescape/kubescape-cli:{{ .Tag }}-amd64"
    use: buildx
    build_flag_templates:
      - "--pull"
      - "--platform=linux/amd64"
      - "--build-arg"
      - "image_version={{ .Tag }}"
    ids:
      - cli
    dockerfile: build/kubescape-cli.Dockerfile
  - image_templates:
      - "quay.io/kubescape/kubescape-cli:{{ .Tag }}-arm64"
    use: buildx
    build_flag_templates:
      - "--pull"
      - "--platform=linux/arm64"
      - "--build-arg"
      - "image_version={{ .Tag }}"
    goarch: arm64
    ids:
      - cli
    dockerfile: build/kubescape-cli.Dockerfile
  - image_templates:
      - "quay.io/kubescape/kubescape:{{ .Tag }}-amd64"
    use: buildx
    build_flag_templates:
      - "--pull"
      - "--platform=linux/amd64"
      - "--build-arg"
      - "image_version={{ .Tag }}"
    ids:
      - downloader
      - http
    dockerfile: build/Dockerfile
  - image_templates:
      - "quay.io/kubescape/kubescape:{{ .Tag }}-arm64"
    use: buildx
    build_flag_templates:
      - "--pull"
      - "--platform=linux/arm64"
      - "--build-arg"
      - "image_version={{ .Tag }}"
    goarch: arm64
    ids:
      - downloader
      - http
    dockerfile: build/Dockerfile

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

checksum:
  name_template: "checksums.sha256"

sboms:
  - artifacts: binary

krews:
  - name: kubescape
    ids:
      - cli
    homepage: https://kubescape.io/
    description: It includes risk analysis, security compliance, and misconfiguration scanning with an easy-to-use CLI interface, flexible output formats, and automated scanning capabilities.
    short_description: Scan resources and cluster configs against security frameworks.

release:
  draft: true
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
